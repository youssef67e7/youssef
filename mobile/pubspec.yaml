name: pharmaworld
description: PharmaWorld - Your Complete Online Pharmacy
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  hooks_riverpod: ^2.4.9
  flutter_hooks: ^0.21.3+1

  # Routing
  go_router: ^17.3.0

  # Networking
  dio: ^5.4.1
  dio_smart_retry: ^7.0.1
  pretty_dio_logger: ^1.4.0

  # Serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # UI
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.9
  google_fonts: ^8.1.0
  carousel_slider: ^5.0.0
  photo_view: ^0.15.0
  flutter_html: ^3.0.0-beta.2
  lottie: ^3.1.0
  pull_to_refresh: ^2.0.0
  fluttertoast: ^9.0.0
  shimmer_animation: ^2.2.2+1

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.2

  # Firebase
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  firebase_messaging: ^16.4.1
  firebase_analytics: ^12.4.3
  firebase_crashlytics: ^5.2.4
  firebase_app_check: ^0.4.5
  firebase_storage: ^13.4.3

  # Auth
  google_sign_in: ^7.2.0

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.2.4
  image_picker: ^1.0.7
  permission_handler: ^12.0.3
  mobile_scanner: ^7.2.0
  geolocator: ^14.0.3
  geocoding: ^4.0.0
  connectivity_plus: ^7.2.0
  package_info_plus: ^10.2.0
  flutter_local_notifications: ^22.0.1
  share_plus: ^13.2.0
  in_app_review: ^2.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  freezed: ^2.4.7
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  custom_lint: ^0.6.1
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true

  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/translations/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
