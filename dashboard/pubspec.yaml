name: pharmaworld_dashboard
description: PharmaWorld Admin Dashboard - Pharmacy Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Routing
  go_router: ^13.0.0

  # Network
  dio: ^5.4.0

  # Serialization
  freezed_annotation: ^2.4.1
  freezed: ^2.4.7
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1

  # Charts
  fl_chart: ^0.66.0

  # Data Tables
  data_table_2: ^2.5.8

  # Responsive
  flutter_screenutil: ^5.9.1

  # Fonts
  google_fonts: ^6.1.0

  # Internationalization
  intl: ^0.20.2

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Firebase
  firebase_core: ^2.25.0
  firebase_analytics: ^10.8.0

  # Utilities
  url_launcher: ^6.2.2
  csv: ^5.1.1
  printing: ^5.12.0
  pdf: ^3.10.7
  excel: ^4.0.3
  file_saver: ^0.2.9
  universal_html: ^2.2.4
  uuid: ^4.2.1
  equatable: ^2.0.5
  collection: ^1.18.0
  image_picker: ^1.0.7
  flutter_svg: ^2.0.9
  badges: ^3.1.2
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  responsive_builder: ^0.7.0
  auto_size_text: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  freezed_annotation: ^2.4.1
  json_serializable: ^6.7.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/translations/
