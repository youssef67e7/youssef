name: Mobile APK Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. 1.0.0)'
        required: true

jobs:
  build-and-release:
    name: Build & Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Setup google-services.json
        run: |
          if [ -n "$GOOGLE_SERVICES_B64" ]; then
            echo "$GOOGLE_SERVICES_B64" | base64 -d > android/app/google-services.json
            echo "Using real google-services.json from secrets"
          else
            cat > android/app/google-services.json << 'DUMMY'
            {
              "project_info": {
                "project_number": "000000000000",
                "project_id": "pharmaworld-placeholder",
                "storage_bucket": "pharmaworld-placeholder.appspot.com"
              },
              "client": [
                {
                  "client_info": {
                    "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                    "android_client_info": {
                      "package_name": "com.pharmaworld.mobile"
                    }
                  },
                  "oauth_client": [],
                  "api_key": [
                    {
                      "current_key": "AIzaSyDummyKeyForBuildOnly"
                    }
                  ],
                  "services": {
                    "appinvite_service": {
                      "other_platform_oauth_client": []
                    }
                  }
                }
              ],
              "configuration_version": "1"
            }
            DUMMY
            echo "WARNING: Using dummy google-services.json. Firebase will not work in this build."
          fi
        env:
          GOOGLE_SERVICES_B64: ${{ secrets.GOOGLE_SERVICES_JSON }}

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/PharmaWorld-v${{ github.event.inputs.version }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: "PharmaWorld v${{ github.event.inputs.version }}"
          body: |
            ## PharmaWorld v${{ github.event.inputs.version }}
            
            ### Installation
            1. Download `PharmaWorld-v${{ github.event.inputs.version }}.apk` below
            2. Open the APK on your Android device
            3. Allow installation from unknown sources if prompted
          files: mobile/build/app/outputs/flutter-apk/PharmaWorld-v${{ github.event.inputs.version }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
